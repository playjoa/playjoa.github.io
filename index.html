<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>João Milone — Senior Game Engineer</title>
    <meta name="description" content="Senior Game Engineer | Unity & Unreal Engine Developer">
    <link rel="icon" href="images/icon.ico" type="image/x-icon">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">

    <!-- Icon pack: Font Awesome 5 Free (CC BY 4.0 / SIL OFL 1.1 / MIT) -->
    <link rel="stylesheet" href="assets/css/fontawesome-all.min.css">

    <!-- App styles -->
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <!-- Navigation Header -->
    <header class="nav-header">
        <div class="nav-container">
            <a href="#" class="nav-brand" id="nav-title">João Milone</a>
            <div class="nav-actions">
                <a href="cv.html" class="nav-button nav-button-primary" id="cv-link" title="Download CV">
                    <i class="fas fa-arrow-down" aria-hidden="true"></i>
                    <span class="nav-button-label" id="cv-link-label">CV</span>
                </a>
                <button class="nav-button" id="language-toggle" title="Toggle language" aria-label="Toggle language">
                    <span class="nav-button-label" id="language-label">EN</span>
                </button>
                <button class="nav-icon-button" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
                    <i class="fas fa-moon" aria-hidden="true"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="container">
        <!-- Sidebar (Desktop) -->
        <aside class="sidebar">
            <!-- Hero Section -->
            <section class="hero-section">
                <div class="hero-card">
                    <div class="avatar-container">
                        <img src="images/avatar.jpg" alt="João Milone" class="avatar">
                    </div>
                    <div class="hero-content">
                        <h1 class="hero-name" id="hero-name">João de Carvalho Milone</h1>
                        <p class="hero-title" id="hero-title">Senior Game Engineer · Unity &amp; Unreal</p>
                        <p class="hero-location" id="hero-location">
                            <i class="fas fa-map-marker-alt" aria-hidden="true"></i>
                            <span>São Paulo, Brazil</span>
                        </p>
                        <div class="hero-tags">
                            <span class="tag">Unity</span>
                            <span class="tag">Unreal Engine</span>
                            <span class="tag">C#</span>
                            <span class="tag">C++</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Social Links -->
            <section class="social-section">
                <h2 class="section-title section-title-sm" id="contact-title">Connect</h2>
                <div class="social-grid" id="social-links">
                    <!-- Social links will be populated by JavaScript -->
                </div>
            </section>

            <!-- About Section -->
            <section class="about-section">
                <h2 class="section-title section-title-sm" id="about-title">About</h2>
                <p class="about-content" id="about-content">
                    <!-- About content will be populated by JavaScript -->
                </p>
            </section>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Projects Section -->
            <section class="projects-section">
                <div class="section-header">
                    <h2 class="section-title" id="projects-title">Selected Work</h2>
                    <p class="section-subtitle" id="projects-subtitle">Shipped titles &amp; experimental builds</p>
                </div>
                <div class="projects-grid" id="projects-grid">
                    <!-- Projects will be populated by JavaScript -->
                </div>
            </section>

            <!-- Experience Section -->
            <section class="experience-section">
                <div class="section-header">
                    <h2 class="section-title" id="experience-title">Experience</h2>
                </div>
                <div class="experience-list" id="experience-list">
                    <!-- Experience items will be populated by JavaScript -->
                </div>
            </section>

            <!-- Skills Section -->
            <section class="skills-section">
                <div class="section-header">
                    <h2 class="section-title" id="skills-title">Skills</h2>
                </div>
                <div class="skills-grid" id="skills-grid">
                    <!-- Skills will be populated by JavaScript -->
                </div>
            </section>

            <!-- Education Section -->
            <section class="education-section">
                <div class="section-header">
                    <h2 class="section-title" id="education-title">Education</h2>
                </div>
                <div class="education-list" id="education-list">
                    <!-- Education items will be populated by JavaScript -->
                </div>
            </section>

            <!-- Footer -->
            <footer class="footer">
                <p class="footer-text" id="footer-text">© <span id="footer-year"></span> João de Carvalho Milone. Built with care.</p>
            </footer>
        </div>
    </main>

    <!-- Image Modal -->
    <div class="modal" id="image-modal">
        <div class="modal-overlay" id="modal-overlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modal-close" aria-label="Close">
                <i class="fas fa-times" aria-hidden="true"></i>
            </button>
            <img id="modal-image" src="" alt="">
            <div class="modal-nav">
                <button class="modal-nav-btn" id="modal-prev" aria-label="Previous image">
                    <i class="fas fa-chevron-left" aria-hidden="true"></i>
                </button>
                <button class="modal-nav-btn" id="modal-next" aria-label="Next image">
                    <i class="fas fa-chevron-right" aria-hidden="true"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Loading Indicator -->
    <div class="loading-indicator" id="loading-indicator">
        <div class="spinner"></div>
    </div>

    <!-- JavaScript -->
    <script src="assets/js/portfolio.js"></script>
</body>
</html>
